services:
  arlene-api:
    container_name: arlene-api
    init: true
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: development
    volumes:
      - .:/usr/src/app
      - ./uploads:/usr/src/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      database-arlene:
        condition: service_healthy
    command: pnpm start:dev

  database-arlene:
    container_name: database-arlene
    image: mariadb:lts
    env_file:
      - .env
    volumes:
      - database-data-arlene:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  database-data-arlene: