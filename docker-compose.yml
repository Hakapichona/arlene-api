services:
  arlene-api:
    container_name: arlene-api
    init: true
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - ./uploads:/usr/src/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      database-arlene-api:
        condition: service_healthy
    restart: no

  database-arlene-api:
    container_name: database-arlene-api
    image: mariadb:lts
    env_file:
      - .env
    volumes:
      - database-data-arlene-api:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: no

volumes:
  database-data-arlene-api: